name: Smart Reporter Test

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  e2e:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: ./Test_Project

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./Test_Project

      - name: Run Playwright tests
        run: npx playwright test ./tests/runner.spec.js --reporter=list,playwright-smart-reporter --output=test-results/
        working-directory: ./Test_Project

      - name: Prepare report for Pages
        run: |
          cp Test_Project/tests/smart-report.html Test_Project/tests/index.html
          ls Test_Project/tests/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Test_Project/tests/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Test_Project/tests/
          publish_branch: gh-pages
          force_orphan: true