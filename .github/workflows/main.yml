name: Smart Reporter Test

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  e2e:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: ./Test_Project

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./Test_Project

      - name: Run Playwright tests
        run: npx playwright test ./tests/runner.spec.js --reporter=list,playwright-smart-reporter --output=test-results/
        working-directory: ./Test_Project

      - name: Prepare report for Pages
        run: |
          cp Test_Project/tests/smart-report.html Test_Project/tests/index.html
          ls Test_Project/tests/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Test_Project/tests/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Test_Project/tests/
          publish_branch: gh-pages
          force_orphan: true

      - name: Send Playwright report via email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Playwright Test Report – Build #${{ github.run_number }}"
          body: |
            Hi Team,

            The Playwright test report for build #${{ github.run_number }} is available:

            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html

            Workflow: ${{ github.workflow }}
            Triggered by: ${{ github.event_name }}

            Regards,
            CI/CD Automation Bot
          to: ${{ secrets.Mail_Username }}
          from: ${{ secrets.EMAIL_USER }}

      - name: Fail workflow if tests failed
        if: failure()
        run: exit 1