name: Smart Reporter Test

on:
  workflow_dispatch: {}

jobs:
  test:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: List contains of working directory
        run: ls -R            

      - name: Install dependencies
        run: npm ci
        working-directory: ./Test_Project

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./Test_Project

      - name: Run Playwright tests
        run: npx playwright test ./Test_Project/tests/runner.spec.js --reporter=list,html --output=test-results/
        working-directory: ./Test_Project

      - name: List contains of working directory
        run: ls -R   

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ./Test_Project/tests/
          retention-days: 30